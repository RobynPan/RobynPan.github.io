<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Robyn Pan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link id="font-link" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Space+Mono:ital@0;1&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <style>
    :root {
      --ink:    #d4d4d4;
      --paper:  #2a2a2a;
      --cream:  #333333;
      --rust:   #4d9de0;
      --sage:   #7a8fa6;
      --muted:  #888;
      --border: rgba(255,255,255,0.1);
      --dark:   #1a1a1a;
      --dark2:  #212121;
      --font-serif: 'Playfair Display', serif;
      --font-mono:  'Space Mono', monospace;
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    body {
      background: var(--paper);
      color: var(--ink);
      font-family: var(--font-mono);
      font-size: 13px;
      line-height: 1.8;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* HEADER */
    #site-header {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: end;
      padding: 2.5rem 4rem 2rem;
      background: linear-gradient(to bottom, var(--dark2), var(--dark));
      border-bottom: 2px solid #111;
      animation: fadeUp 0.45s ease both;
    }
    /* "Robyn" upright, "Pan" italic+rust */
    .site-name {
      font-family: var(--font-serif);
      font-size: clamp(2.2rem, 5vw, 4rem);
      font-weight: 400;
      line-height: 1;
      letter-spacing: -0.02em;
      cursor: pointer;
      color: #fff;
      text-shadow: 0 0 10px #111;
    }


    .site-info {
      font-family: var(--font-mono);
      font-size: 11px;
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.08em;
      text-align: right;
      line-height: 2;
    }
    .site-info a { color: rgba(255,255,255,0.4); text-decoration: none; transition: color 0.15s; }
    .site-info a:hover { color: var(--rust); }

    /* NAV */
    #site-nav {
      display: flex;
      background: var(--dark);
      border-bottom: 2px solid #111;
      overflow-x: auto;
      animation: fadeUp 0.45s ease 0.07s both;
    }
    #site-nav::before {
      content: '';
      display: block;
      min-width: 2rem;
      border-right: 1px solid rgba(255,255,255,0.08);
    }

    #site-nav a, #site-nav button {
      display: block;
      padding: 0.8rem 1.3rem;
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-decoration: none;
      color: rgba(255,255,255,0.65);
      background: none; border: none;
      border-right: 1px solid rgba(255,255,255,0.08);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
    }
    #site-nav a:hover, #site-nav button:hover { background: var(--dark2); color: #fff; }
    #site-nav .nav-active { background: var(--rust); color: #fff; }

    /* VIEW SYSTEM */
    .view { display: none; }
    .view.active { display: block; animation: slideIn 0.35s cubic-bezier(0.22,1,0.36,1) both; }
    @keyframes slideIn { from { opacity:0; transform:translateY(18px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeUp  { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }

    /* BACK BAR */
    .back-bar {
      padding: 0.9rem 4rem;
      border-bottom: 1px solid var(--border);
      background: var(--dark);
      display: flex; align-items: center; justify-content: space-between;
    }
    .back-btn {
      background: none; border: none;
      font-family: var(--font-mono); font-size: 11px;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: rgba(255,255,255,0.45); cursor: pointer; padding: 0;
      transition: color 0.15s;
    }
    .back-btn::before { content: '← '; }
    .back-btn:hover { color: var(--rust); }
    .view-label { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }

    /* GRID INTRO */
    .grid-intro {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 3rem;
      padding: 3rem 4rem;
      border-bottom: 1px solid var(--border);
      align-items: start;
      animation: fadeUp 0.45s ease 0.15s both;
    }

    /* Tag boxes — used in intro AND about */
    .identity-tags { display: flex; flex-direction: column; gap: 0.35rem; }
    .id-tag {
      display: inline-block;
      padding: 0.2rem 0.65rem;
      border: 1px solid rgba(255,255,255,0.2);
      font-family: var(--font-mono);
      font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--ink);
      white-space: nowrap;
    }


    .bio-text {
      font-family: var(--font-serif);
      font-size: 1.05rem; line-height: 1.85; max-width: 640px;
    }

    /* GRID — left to right, with horizontal buffer */
    #grid-view { padding: 0 3rem 5rem; }
    .masonry { display: grid; grid-template-columns: repeat(3, 1fr); padding-top: 2rem; gap: 0; }
    @media (max-width: 1100px) { .masonry { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 640px)  { .masonry { grid-template-columns: 1fr; } }

    /* CARD */
    .project-card {
      cursor: pointer;
      background: var(--cream);
      position: relative;
      overflow: hidden;
      margin-bottom: 0;
    }
    .project-card:hover .card-img { transform: scale(1.04); }

    .card-thumb {
      width: 100%; aspect-ratio: 1/1;
      background: var(--cream);
      position: relative; overflow: hidden;
    }
    .card-img {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover; display: block;
      transition: transform 0.4s ease;
    }
    .card-thumb-title {
      position: absolute; bottom:0; left:0; right:0;
      padding: 2.5rem 1rem 0.9rem;
      background: linear-gradient(to top, rgba(0,0,0,0.82) 0%, transparent 100%);
      font-family: var(--font-serif);
      font-size: 1rem; font-weight: 700; color: #fff;
      line-height: 1.25; z-index: 1;
      text-shadow: 0 1px 4px rgba(0,0,0,0.6);
    }
    .card-thumb.loading {
      background: linear-gradient(90deg, var(--cream) 25%, var(--paper) 50%, var(--cream) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
    }
    .card-no-img {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-mono); font-size: 10px;
      letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted);
    }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    /* PROJECT VIEW */
    .project-hero {
      display: grid;
      grid-template-columns: 1.4fr 1fr;
      border-bottom: 2px solid #111;
      align-items: start;
    }
    @media (max-width: 900px) { .project-hero { grid-template-columns: 1fr; } }

    .text-col { padding: 3.5rem 4rem; }
    .proj-meta { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--rust); margin-bottom: 0.7rem; }
    #project-title { font-family: var(--font-serif); font-size: clamp(2rem,4vw,3.2rem); font-weight: 700; line-height: 1.1; margin-bottom: 1.5rem; }
    #project-tags { display:flex; flex-wrap:wrap; gap:0.4rem; margin-bottom:2.5rem; padding-bottom:2rem; border-bottom:1px solid var(--border); }

    .tag {
      font-family: var(--font-mono); font-size: 9px;
      letter-spacing: 0.1em; text-transform: uppercase;
      padding: 0.15rem 0.5rem;
      border: 1px solid rgba(255,255,255,0.2); color: var(--muted);
    }

    /* VIDEO EMBED */
    .project-video {
      margin-bottom: 2.5rem;
      padding-bottom: 2rem;
      border-bottom: 1px solid var(--border);
    }
    .project-video iframe {
      width: 100%; aspect-ratio: 16/9;
      border: none; display: block;
    }

    #project-body { font-family: var(--font-serif); font-size: 1.05rem; line-height: 1.85; max-width: 640px; }
    #project-body h2 { font-size:1.4rem; font-weight:400; font-style:italic; margin:2.5rem 0 0.8rem; padding-bottom:0.4rem; border-bottom:1px solid var(--border); }
    #project-body p  { margin-bottom: 1.1rem; }
    #project-body ul { margin:0.5rem 0 1.2rem 1.5rem; font-family:var(--font-mono); font-size:12px; }
    #project-body ul li { margin-bottom: 0.4rem; }
    #project-body a { color: var(--rust); }
    #project-body code { background:var(--cream); padding:0.1rem 0.4rem; font-size:0.85em; }

    .img-col { border-left: 1px solid var(--border); }
    .img-col-inner { padding: 2rem; display:flex; flex-direction:column; gap:1.2rem; }
    .proj-img-wrap { overflow:hidden; background:var(--cream); }
    .proj-img-wrap img { width:100%; display:block; transition:transform 0.4s; }
    .proj-img-wrap:hover img { transform: scale(1.03); }
    .img-count { padding:1rem 2rem; font-family:var(--font-mono); font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:var(--muted); border-top:1px solid var(--border); }

    /* ABOUT VIEW */
    .about-hero {
      display: grid;
      grid-template-columns: 1fr 1.6fr;
      border-bottom: 2px solid #111;
      align-items: start;
    }
    @media (max-width: 900px) { .about-hero { grid-template-columns: 1fr; } }

    .about-photo-col {
      position: sticky; top: 0;
      height: 100vh;
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    @media (max-width: 900px) { .about-photo-col { position:static; height:70vw; } }

    .about-photo-wrap {
      flex: 1; position: relative;
      background: var(--cream); overflow: hidden;
    }
    .about-photo-wrap img {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover; display: block;
      transition: opacity 0.4s ease;
    }
    .photo-arrow {
      position: absolute; top:50%; transform:translateY(-50%);
      background: rgba(0,0,0,0.45); border: none;
      color: #fff; font-size: 1.4rem;
      padding: 0.7rem 1rem; cursor: pointer; z-index: 2;
      transition: background 0.15s; line-height: 1;
    }
    .photo-arrow:hover { background: rgba(0,0,0,0.8); }
    .photo-arrow.prev { left: 0; border-radius: 0 3px 3px 0; }
    .photo-arrow.next { right: 0; border-radius: 3px 0 0 3px; }
    .about-photo-counter {
      padding: 0.7rem; text-align: center;
      font-family: var(--font-mono); font-size: 10px;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--muted); border-top: 1px solid var(--border);
    }

    .about-text-col { padding: 3.5rem 4rem; }
    #about-name { font-family: var(--font-serif); font-size: clamp(2rem,4vw,3rem); font-weight:700; line-height:1.1; margin-bottom:1.5rem; }

    /* About tags — same id-tag boxes */
    .about-tags { display:flex; flex-wrap:wrap; gap:0.4rem; margin-bottom:2rem; }

    .about-info-grid {
      display: grid; grid-template-columns: auto 1fr;
      gap: 0.3rem 1.2rem; margin-bottom: 2.5rem;
      padding-bottom: 2rem; border-bottom: 1px solid var(--border);
      font-family: var(--font-mono); font-size: 11px;
    }
    .about-info-grid dt { color: var(--muted); text-transform:uppercase; letter-spacing:0.1em; }
    .about-info-grid dd a { color: var(--rust); text-decoration:none; }
    .about-info-grid dd a:hover { text-decoration: underline; }
    #about-body { font-family: var(--font-serif); font-size: 1.05rem; line-height: 1.85; max-width: 640px; }
    #about-body p  { margin-bottom: 1.1rem; }
    #about-body h2 { font-size:1.3rem; font-weight:400; font-style:italic; margin:2rem 0 0.6rem; padding-bottom:0.3rem; border-bottom:1px solid var(--border); }

    /* LINKS VIEW */
    .links-body { max-width: 720px; margin: 0 auto; padding: 3.5rem 4rem 5rem; }
    #links-title { font-family: var(--font-serif); font-size: clamp(2rem,4vw,3rem); font-weight:700; margin-bottom:3rem; }
    #links-body { font-family: var(--font-serif); font-size: 1.05rem; line-height: 1.85; }
    #links-body h2 { font-size:1.2rem; font-weight:400; font-style:italic; margin:2.5rem 0 0.8rem; padding-bottom:0.3rem; border-bottom:1px solid var(--border); }
    #links-body ul { list-style:none; margin:0 0 1.5rem 0; }
    #links-body ul li { padding:0.5rem 0; border-bottom:1px solid var(--border); }
    #links-body ul li:last-child { border-bottom:none; }
    #links-body a { color: var(--rust); text-decoration:none; }
    #links-body a:hover { text-decoration: underline; }
    #links-body p { margin-bottom: 1rem; }

    /* SPINNER */
    .spinner { width:24px; height:24px; border:2px solid var(--border); border-top-color:var(--rust); border-radius:50%; animation:spin 0.7s linear infinite; margin:4rem auto; }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* FOOTER */
    #site-footer {
      background: var(--dark); border-top: 2px solid #111;
      padding: 1.5rem 4rem;
      display: flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:1rem;
    }
    .foot-name { font-family:var(--font-serif); font-style:italic; color:#f2f2f2; }
    .foot-links { display:flex; gap:1.5rem; }
    .foot-links a { font-family:var(--font-mono); font-size:11px; letter-spacing:0.1em; text-transform:uppercase; color:rgba(255,255,255,0.45); text-decoration:none; transition:color 0.15s; }
    .foot-links a:hover { color:#fff; }

    /* FONT SWITCHER */
    #font-switcher {
      display: flex; align-items: center; justify-content: center;
      gap: 1rem; flex-wrap: wrap;
      padding: 0.6rem 4rem;
      background: var(--dark);
      border-top: 1px solid rgba(255,255,255,0.04);
    }
    .font-switcher-label { font-family:var(--font-mono); font-size:9px; letter-spacing:0.12em; text-transform:uppercase; color:rgba(255,255,255,0.18); }
    .font-btn {
      background:none; border:none;
      font-size:10px; letter-spacing:0.06em; text-transform:uppercase;
      color:rgba(255,255,255,0.22); cursor:pointer; padding:0.2rem 0.35rem;
      transition:color 0.15s; border-bottom: 1px solid transparent;
    }
    .font-btn:hover { color:rgba(255,255,255,0.6); }
    .font-btn.active { color:var(--rust); border-bottom-color:var(--rust); }

    /* RESPONSIVE */
    @media (max-width: 700px) {
      #site-header, .back-bar, .text-col, .about-text-col, .links-body, #site-footer, .grid-intro { padding-left:1.5rem; padding-right:1.5rem; }
      #grid-view { padding-left: 0.5rem; padding-right: 0.5rem; }
      #site-header { grid-template-columns:1fr; }
      .site-info { text-align:left; }
      .grid-intro { grid-template-columns:1fr; gap:1.5rem; }
    }
  </style>
</head>
<body>

  <header id="site-header">
    <div class="site-name" id="home-link">Robyn Pan</div>
    <div class="site-info" id="site-info-block"></div>
  </header>

  <nav id="site-nav">
    <button id="nav-work" class="nav-active">Main</button>
    <button id="nav-about">About</button>
    <button id="nav-links">Links</button>
    <a href="https://github.com/robynpan" target="_blank">GitHub &#8599;</a>
  </nav>

  <main>

    <!-- GRID VIEW -->
    <div id="grid-view" class="view active">
      <div class="grid-intro">
        <div class="identity-tags" id="intro-tags"></div>
        <p class="bio-text" id="intro-text"></p>
      </div>
      <div class="masonry" id="card-grid"></div>
    </div>

    <!-- PROJECT VIEW -->
    <div id="project-view" class="view">
      <div class="back-bar">
        <button class="back-btn" id="proj-back">All projects</button>
        <span class="view-label" id="proj-slug"></span>
      </div>
      <div class="project-hero">
        <div class="text-col">
          <div class="proj-meta">Project</div>
          <h1 id="project-title"></h1>
          <div id="project-tags"></div>
          <div id="project-body"><div class="spinner"></div></div>
        </div>
        <div class="img-col">
          <div class="img-col-inner" id="proj-images"></div>
          <div class="img-count" id="proj-img-count"></div>
        </div>
      </div>
    </div>

    <!-- ABOUT VIEW -->
    <div id="about-view" class="view">
      <div class="back-bar">
        <button class="back-btn" id="about-back">Back</button>
        <span class="view-label">About</span>
      </div>
      <div class="about-hero">
        <div class="about-photo-col">
          <div class="about-photo-wrap" id="about-photo-wrap">
            <button class="photo-arrow prev" id="photo-prev">&#8592;</button>
            <button class="photo-arrow next" id="photo-next">&#8594;</button>
          </div>
          <div class="about-photo-counter" id="about-counter"></div>
        </div>
        <div class="about-text-col">
          <h1 id="about-name"></h1>
          <div class="about-tags" id="about-tags"></div>
          <dl class="about-info-grid" id="about-info"></dl>
          <div id="about-body"><div class="spinner"></div></div>
        </div>
      </div>
    </div>

    <!-- LINKS VIEW -->
    <div id="links-view" class="view">
      <div class="back-bar">
        <button class="back-btn" id="links-back">Back</button>
        <span class="view-label">Links</span>
      </div>
      <div class="links-body">
        <h1 id="links-title"></h1>
        <div id="links-body"><div class="spinner"></div></div>
      </div>
    </div>

  </main>

  <footer id="site-footer">
    <div class="foot-name" id="foot-name">Robyn Pan</div>
    <div class="foot-links">
      <a href="https://github.com/robynpan" target="_blank">GitHub</a>
      <a href="https://bearcover.de" target="_blank">Bearcover</a>
    </div>
  </footer>

  <div id="font-switcher">
    <span class="font-switcher-label">Font:</span>
    <button class="font-btn active" data-font="playfair">Playfair</button>
    <button class="font-btn" data-font="cormorant">Cormorant</button>
    <button class="font-btn" data-font="oldstandard">Old Standard</button>
    <button class="font-btn" data-font="inter">Inter</button>
    <button class="font-btn" data-font="space-grotesk">Grotesk</button>
    <button class="font-btn" data-font="space-mono">Mono</button>
    <button class="font-btn" data-font="unbounded">Unbounded</button>
    <button class="font-btn" data-font="vt323">VT323</button>
  </div>

  <script>
  // FONT SWITCHER
  const FONTS = {
    'playfair':     { url:"https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Space+Mono:ital@0;1&display=swap", serif:"'Playfair Display', serif" },
    'cormorant':    { url:"https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,700;1,400&family=Space+Mono&display=swap",        serif:"'Cormorant Garamond', serif" },
    'oldstandard':  { url:"https://fonts.googleapis.com/css2?family=Old+Standard+TT:ital,wght@0,400;0,700;1,400&family=Space+Mono&display=swap",           serif:"'Old Standard TT', serif" },
    'inter':        { url:"https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=Space+Mono&display=swap",                                serif:"'Inter', sans-serif" },
    'space-grotesk':{ url:"https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&family=Space+Mono&display=swap",                        serif:"'Space Grotesk', sans-serif" },
    'space-mono':   { url:"https://fonts.googleapis.com/css2?family=Space+Mono:ital@0;1&display=swap",                                                     serif:"'Space Mono', monospace" },
    'unbounded':    { url:"https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;700&family=Space+Mono&display=swap",                            serif:"'Unbounded', sans-serif" },
    'vt323':        { url:"https://fonts.googleapis.com/css2?family=VT323&family=Space+Mono&display=swap",                                                 serif:"'VT323', monospace" },
  };
  document.querySelectorAll('.font-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const f = FONTS[btn.dataset.font]; if (!f) return;
      document.getElementById('font-link').href = f.url;
      document.documentElement.style.setProperty('--font-serif', f.serif);
      document.querySelectorAll('.font-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    });
  });

  // MARKDOWN PARSER
  // Format:
  //   # Title
  //   tags: A, B, C
  //   info:
  //     key: value
  //
  //   Body text...
  function parseMd(raw) {
    const lines = raw.split('\n');
    let title = '', tags = [], info = {}, video = '', i = 0;

    // Title
    if (lines[i] && lines[i].startsWith('# ')) {
      title = lines[i].slice(2).trim(); i++;
    }
    while (i < lines.length && lines[i].trim() === '') i++;

    // Tags
    if (lines[i] && lines[i].toLowerCase().startsWith('tags:')) {
      tags = lines[i].replace(/^tags:\s*/i, '').split(',').map(t => t.trim()).filter(Boolean);
      i++;
    }
    while (i < lines.length && lines[i].trim() === '') i++;

    // Video
    if (lines[i] && lines[i].toLowerCase().startsWith('video:')) {
      video = lines[i].replace(/^video:\s*/i, '').trim();
      i++;
    }
    while (i < lines.length && lines[i].trim() === '') i++;

    // Info block
    if (lines[i] && lines[i].toLowerCase().startsWith('info:')) {
      i++;
      while (i < lines.length && (lines[i].startsWith('  ') || lines[i].startsWith('\t'))) {
        const m = lines[i].match(/^[\s\t]+([^:]+):\s*(.+)$/);
        if (m) info[m[1].trim()] = m[2].trim();
        i++;
      }
    }
    while (i < lines.length && lines[i].trim() === '') i++;

    return { title, tags, info, video, body: lines.slice(i).join('\n') };
  }

  // Render tags as id-tag boxes
  function tagBoxes(tags) {
    return tags.map(t => `<span class="id-tag">${t}</span>`).join('');
  }

  // VIEW SYSTEM
  function showView(id) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    window.scrollTo(0, 0);
  }
  function setNav(id) {
    document.querySelectorAll('#site-nav button').forEach(b => b.classList.remove('nav-active'));
    if (id) document.getElementById(id).classList.add('nav-active');
  }

  // ABOUT
  let aboutData = null, aboutPhotos = [], aboutIdx = 0;

  async function loadAbout() {
    if (aboutData) return;
    try {
      const r = await fetch('about/README.md');
      if (r.ok) aboutData = parseMd(await r.text());
    } catch(e) {}
    if (!aboutData) aboutData = { title:'Robyn Pan', tags:[], info:{}, body:'' };

    // Load photos list
    try {
      const r = await fetch('about/images/images.json');
      if (r.ok) { const f = await r.json(); aboutPhotos = f.map(n => `about/images/${n}`); }
    } catch(e) {}

    // Header info block: city · pronouns · email
    const inf = aboutData.info;
    const parts = [];
    if (inf.city)     parts.push(inf.city);
    if (inf.pronouns) parts.push(inf.pronouns);
    if (inf.email)    parts.push(`<a href="mailto:${inf.email}">${inf.email}</a>`);
    document.getElementById('site-info-block').innerHTML = parts.join(' · ');

    // Footer name
    if (aboutData.title) document.getElementById('foot-name').textContent = aboutData.title;

    // Grid intro — tag boxes
    document.getElementById('intro-tags').innerHTML = tagBoxes(aboutData.tags);

    // Grid intro — first paragraph as bio
    const firstPara = (aboutData.body || '').split(/\n\s*\n/)[0].trim();
    document.getElementById('intro-text').textContent = firstPara;
  }

  function openAbout() {
    if (!aboutData) return;
    document.getElementById('about-name').textContent = aboutData.title || 'Robyn Pan';
    document.getElementById('about-tags').innerHTML = tagBoxes(aboutData.tags);

    // Info grid
    document.getElementById('about-info').innerHTML = Object.entries(aboutData.info).map(([k, v]) => {
      let html = v;
      if (v.includes('@')) {
        html = `<a href="mailto:${v}">${v}</a>`;
      } else if (v.match(/\.(com|de|io|org|net|co)(\/|$)/)) {
        const href = v.startsWith('http') ? v : 'https://' + v;
        html = `<a href="${href}" target="_blank">${v}</a>`;
      }
      return `<dt>${k}</dt><dd>${html}</dd>`;
    }).join('');

    document.getElementById('about-body').innerHTML = marked.parse(aboutData.body || '');
    renderAboutPhoto();
    showView('about-view'); setNav('nav-about');
    history.pushState({ view:'about' }, '', '#about');
  }

  function renderAboutPhoto() {
    const wrap = document.getElementById('about-photo-wrap');
    wrap.querySelectorAll('img').forEach(img => img.remove());
    const n = aboutPhotos.length;
    document.getElementById('photo-prev').style.display = n > 1 ? '' : 'none';
    document.getElementById('photo-next').style.display = n > 1 ? '' : 'none';
    if (!n) { document.getElementById('about-counter').textContent = ''; return; }
    const img = document.createElement('img');
    img.src = aboutPhotos[aboutIdx]; img.alt = 'Robyn Pan';
    wrap.appendChild(img);
    document.getElementById('about-counter').textContent = `${aboutIdx + 1} / ${n}`;
  }

  document.getElementById('photo-prev').addEventListener('click', () => {
    aboutIdx = (aboutIdx - 1 + aboutPhotos.length) % aboutPhotos.length; renderAboutPhoto();
  });
  document.getElementById('photo-next').addEventListener('click', () => {
    aboutIdx = (aboutIdx + 1) % aboutPhotos.length; renderAboutPhoto();
  });

  // LINKS
  let linksData = null;
  async function loadLinks() {
    if (linksData) return;
    try { const r = await fetch('links/README.md'); if (r.ok) linksData = parseMd(await r.text()); } catch(e) {}
    if (!linksData) linksData = { title:'Links', tags:[], info:{}, body:'' };
  }
  function openLinks() {
    document.getElementById('links-title').textContent = linksData.title || 'Links';
    document.getElementById('links-body').innerHTML = marked.parse(linksData.body || '');
    showView('links-view'); setNav('nav-links');
    history.pushState({ view:'links' }, '', '#links');
  }

  // PROJECTS
  let projects = [], cache = {};

  async function loadProjects() {
    try {
      const r = await fetch('projects/projects.json');
      if (!r.ok) throw new Error();
      projects = await r.json();
    } catch(e) {
      document.getElementById('card-grid').innerHTML =
        '<p style="color:var(--muted);padding:2rem 4rem;font-family:var(--font-mono);font-size:11px">No projects/projects.json found.</p>';
      return;
    }
    renderSkeletons();
    await Promise.all(projects.map(loadOne));
    renderCards();
    handleHash();
  }

  async function loadOne(slug) {
    let d = { title: slug, tags: [], info: {}, body: '' };
    try {
      const r = await fetch(`projects/${slug}/README.md`);
      if (r.ok) d = parseMd(await r.text());
    } catch(e) {}
    let imgs = [];
    try {
      const r = await fetch(`projects/${slug}/images/images.json`);
      if (r.ok) { const f = await r.json(); imgs = f.map(n => `projects/${slug}/images/${n}`); }
    } catch(e) {}
    cache[slug] = { ...d, images: imgs };
  }

  function renderSkeletons() {
    document.getElementById('card-grid').innerHTML = projects.map(s =>
      `<div class="project-card" data-slug="${s}"><div class="card-thumb loading"></div></div>`
    ).join('');
  }

  function renderCards() {
    document.getElementById('card-grid').innerHTML = projects.map(slug => {
      const p = cache[slug] || {}, title = p.title || slug;
      const imgHtml = (p.images && p.images[0])
        ? `<img class="card-img" src="${p.images[0]}" alt="${title}" loading="lazy">`
        : `<div class="card-no-img">${slug}</div>`;
      return `
        <div class="project-card" data-slug="${slug}" tabindex="0" role="button" aria-label="Open: ${title}">
          <div class="card-thumb">
            ${imgHtml}
            <div class="card-thumb-title">${title}</div>
          </div>
        </div>`;
    }).join('');

    document.getElementById('card-grid').querySelectorAll('.project-card').forEach(c => {
      c.addEventListener('click', () => openProject(c.dataset.slug));
      c.addEventListener('keydown', e => { if (e.key==='Enter'||e.key===' ') openProject(c.dataset.slug); });
    });
  }

  function openProject(slug) {
    const p = cache[slug]; if (!p) return;
    document.getElementById('proj-slug').textContent = slug;
    document.getElementById('project-title').textContent = p.title;
    document.getElementById('project-tags').innerHTML = p.tags.map(t => `<span class="tag">${t}</span>`).join('');

    // Video embed (optional)
    const existingVideo = document.getElementById('project-video');
    if (existingVideo) existingVideo.remove();
    if (p.video) {
      const vDiv = document.createElement('div');
      vDiv.id = 'project-video';
      vDiv.className = 'project-video';
      const isLocal = p.video.match(/\.(mp4|webm|mov)$/i);
      vDiv.innerHTML = isLocal
        ? `<video src="${p.video}" controls playsinline style="width:100%;display:block;"></video>`
        : `<iframe src="${p.video}" allowfullscreen loading="lazy"></iframe>`;
      document.getElementById('project-body').before(vDiv);
    }

    document.getElementById('project-body').innerHTML = (p.body && p.body.trim())
      ? marked.parse(p.body)
      : '<p style="color:var(--muted)">No description yet.</p>';

    const imgCol = document.getElementById('proj-images');
    if (!p.images || p.images.length === 0) {
      imgCol.innerHTML = '<div style="padding:3rem 1rem;text-align:center;color:var(--muted);font-family:var(--font-mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase">No images yet</div>';
      document.getElementById('proj-img-count').textContent = '';
    } else {
      imgCol.innerHTML = p.images.map((src, i) =>
        `<div class="proj-img-wrap"><img src="${src}" alt="${p.title} ${i+1}" loading="lazy"></div>`
      ).join('');
      document.getElementById('proj-img-count').textContent = `${p.images.length} image${p.images.length!==1?'s':''}`;
    }

    showView('project-view'); setNav(null);
    history.pushState({ view:'project', slug }, '', `#project/${slug}`);
  }

  // NAV EVENTS
  function goHome() {
    showView('grid-view'); setNav('nav-work');
    history.pushState({}, '', location.pathname);
  }
  document.getElementById('nav-work').addEventListener('click', goHome);
  document.getElementById('home-link').addEventListener('click', goHome);
  document.getElementById('proj-back').addEventListener('click', goHome);
  document.getElementById('about-back').addEventListener('click', goHome);
  document.getElementById('links-back').addEventListener('click', goHome);
  document.getElementById('nav-about').addEventListener('click', async () => { await loadAbout(); openAbout(); });
  document.getElementById('nav-links').addEventListener('click', async () => { await loadLinks(); openLinks(); });

  window.addEventListener('popstate', e => {
    const s = e.state;
    if (!s || s.view==='work') { showView('grid-view'); setNav('nav-work'); }
    else if (s.view==='project' && s.slug) openProject(s.slug);
    else if (s.view==='about') openAbout();
    else if (s.view==='links') openLinks();
  });

  // HASH ROUTING
  function handleHash() {
    const h = location.hash.slice(1);
    if (!h) return;
    if (h==='about') { openAbout(); return; }
    if (h==='links') { openLinks(); return; }
    const slug = h.startsWith('project/') ? h.slice(8) : h;
    if (projects.includes(slug)) openProject(slug);
  }

  // BOOT — load about first (populates header + intro), then projects
  async function boot() {
    await loadAbout();
    loadLinks(); // background prefetch, no await needed
    await loadProjects();
  }
  boot();
  </script>
</body>
</html>
